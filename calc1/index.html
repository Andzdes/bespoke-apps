<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Калькулятор сроков производства мебели — расчёт времени порезки, кромки, сборки и доставки">
    <title>Калькулятор сроков производства</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calc" id="calculator">
        <!-- Header -->
        <header class="calc__header">
            <svg class="calc__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="2" width="16" height="20" rx="2" />
                <line x1="8" y1="6" x2="16" y2="6" />
                <line x1="16" y1="14" x2="16" y2="18" />
                <line x1="8" y1="10" x2="8" y2="10.01" />
                <line x1="12" y1="10" x2="12" y2="10.01" />
                <line x1="16" y1="10" x2="16" y2="10.01" />
                <line x1="8" y1="14" x2="8" y2="14.01" />
                <line x1="12" y1="14" x2="12" y2="14.01" />
                <line x1="8" y1="18" x2="8" y2="18.01" />
                <line x1="12" y1="18" x2="12" y2="18.01" />
            </svg>
            <h1 class="calc__title">Сроки производства</h1>
        </header>

        <!-- Inputs -->
        <div class="calc__fields">

            <div class="calc__group">
                <label class="calc__label" for="sheets_count">Кол-во листов материала</label>
                <div class="calc__number-wrap">
                    <button type="button" class="calc__step calc__step--minus" tabindex="-1" data-target="sheets_count">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <input class="calc__input calc__input--center" type="number" id="sheets_count" name="sheets_count"
                        min="0" placeholder="0" inputmode="numeric">
                    <button type="button" class="calc__step calc__step--plus" tabindex="-1" data-target="sheets_count">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="calc__group">
                <label class="calc__label">Тип кромки</label>
                <div class="calc__number-wrap">
                    <div role="button" class="calc__step calc__step--minus" tabindex="0" id="edge_prev">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </div>
                    <input class="calc__input calc__input--center" type="text" id="edge_type" name="edge_type"
                        value="PVC" readonly style="cursor: default; user-select: none;">
                    <div role="button" class="calc__step calc__step--plus" tabindex="0" id="edge_next">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="calc__group">
                <label class="calc__label" for="delivery_hours">Доставка (часы)</label>
                <div class="calc__number-wrap">
                    <button type="button" class="calc__step calc__step--minus" tabindex="-1"
                        data-target="delivery_hours">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <input class="calc__input calc__input--center calc__input--suffix" type="number" id="delivery_hours"
                        name="delivery_hours" min="0" value="3" inputmode="numeric">
                    <span class="calc__suffix">ч.</span>
                    <button type="button" class="calc__step calc__step--plus" tabindex="-1"
                        data-target="delivery_hours">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="calc__group">
                <label class="calc__label" for="start_date">Начало работ</label>
                <input class="calc__input" type="datetime-local" id="start_date" name="start_date">
            </div>

        </div>

        <!-- Divider -->
        <div class="calc__divider"></div>

        <!-- Results -->
        <div class="calc__results">
            <div class="calc__result">
                <span class="calc__result-label">Чистое время</span>
                <span class="calc__result-value" id="result_duration">—</span>
            </div>
            <div class="calc__result">
                <span class="calc__result-label">Готовность</span>
                <span class="calc__result-value calc__result-value--accent" id="result_datetime">—</span>
            </div>
        </div>

        <!-- Hint / Breakdown -->
        <div id="calc_hint" class="calc__hint"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
