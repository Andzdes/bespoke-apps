<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Калькулятор сроков производства мебели — расчёт времени порезки, кромки, сборки и доставки">
    <title>Калькулятор сроков производства</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calc" id="calculator">
        <!-- Header -->
        <header class="calc__header">
            <svg class="calc__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="2" width="16" height="20" rx="2" />
                <line x1="8" y1="6" x2="16" y2="6" />
                <line x1="16" y1="14" x2="16" y2="18" />
                <line x1="8" y1="10" x2="8" y2="10.01" />
                <line x1="12" y1="10" x2="12" y2="10.01" />
                <line x1="16" y1="10" x2="16" y2="10.01" />
                <line x1="8" y1="14" x2="8" y2="14.01" />
                <line x1="12" y1="14" x2="12" y2="14.01" />
                <line x1="8" y1="18" x2="8" y2="18.01" />
                <line x1="12" y1="18" x2="12" y2="18.01" />
            </svg>
            <h1 class="calc__title">Сроки производства</h1>
            <button type="button" class="calc__settings-btn" id="settings_btn" title="Настройки">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
            </button>
        </header>

        <!-- Settings Panel -->
        <div class="calc__settings" id="settings_panel" hidden>
            <!-- Tabs -->
            <div class="settings__tabs">
                <button type="button" class="settings__tab is-active" data-tab="main">Основные</button>
                <button type="button" class="settings__tab" data-tab="advanced">Дополнительно</button>
            </div>

            <!-- Tab: Основные -->
            <div class="settings__pane" id="settings_tab_main">

                <div class="settings__block">
                    <div class="settings__section-title">Нормы времени (мин/лист)</div>
                    <label class="settings__row">
                        <span class="settings__label">Порезка</span>
                        <input type="number" class="settings__input" id="cfg_cutting" min="1" max="999">
                        <span class="settings__unit">мин</span>
                    </label>
                    <label class="settings__row">
                        <span class="settings__label">Поклейка кромки (ПВХ)</span>
                        <input type="number" class="settings__input" id="cfg_edge_pvc" min="1" max="999">
                        <span class="settings__unit">мин</span>
                    </label>
                    <label class="settings__row">
                        <span class="settings__label">Поклейка кромки (PG)</span>
                        <input type="number" class="settings__input" id="cfg_edge_pg" min="1" max="999">
                        <span class="settings__unit">мин</span>
                    </label>
                    <label class="settings__row">
                        <span class="settings__label">Сборка</span>
                        <input type="number" class="settings__input" id="cfg_assembly" min="1" max="999">
                        <span class="settings__unit">мин</span>
                    </label>
                </div>

                <div class="settings__block">
                    <div class="settings__section-title">Рабочий день</div>
                    <label class="settings__row">
                        <span class="settings__label">Начало</span>
                        <input type="number" class="settings__input" id="cfg_day_start" min="0" max="23">
                        <span class="settings__unit">час</span>
                    </label>
                    <label class="settings__row">
                        <span class="settings__label">Конец</span>
                        <input type="number" class="settings__input" id="cfg_day_end" min="1" max="24">
                        <span class="settings__unit">час</span>
                    </label>
                    <div class="settings__row settings__row--block">
                        <span class="settings__label">Рабочие дни</span>
                        <div class="settings__weekdays" id="cfg_workdays">
                            <label class="settings__day"><input type="checkbox" value="1"><span>Пн</span></label>
                            <label class="settings__day"><input type="checkbox" value="2"><span>Вт</span></label>
                            <label class="settings__day"><input type="checkbox" value="3"><span>Ср</span></label>
                            <label class="settings__day"><input type="checkbox" value="4"><span>Чт</span></label>
                            <label class="settings__day"><input type="checkbox" value="5"><span>Пт</span></label>
                            <label class="settings__day"><input type="checkbox" value="6"><span>Сб</span></label>
                            <label class="settings__day"><input type="checkbox" value="7"><span>Вс</span></label>
                        </div>
                    </div>
                </div>

                <div class="settings__block">
                    <div class="settings__section-title">Производство</div>
                    <label class="settings__row">
                        <span class="settings__label">Лимит листов PG (+1 день)</span>
                        <input type="number" class="settings__input" id="cfg_pg_limit" min="1" max="999">
                        <span class="settings__unit">л.</span>
                    </label>
                    <label class="settings__row">
                        <span class="settings__label">Доставка по умолчанию</span>
                        <input type="number" class="settings__input" id="cfg_delivery_default" min="0" max="99">
                        <span class="settings__unit">ч.</span>
                    </label>
                </div>
            </div>

            <!-- Tab: Дополнительно -->
            <div class="settings__pane" id="settings_tab_advanced" hidden>

                <div class="settings__block">
                    <div class="settings__section-title">Интерфейс</div>
                    <label class="settings__row">
                        <span class="settings__label">Задержка автокрутки ±</span>
                        <input type="number" class="settings__input" id="cfg_hold_delay" min="100" max="5000"
                            step="100">
                        <span class="settings__unit">мс</span>
                    </label>
                    <label class="settings__row">
                        <span class="settings__label">Скорость автокрутки</span>
                        <input type="number" class="settings__input" id="cfg_hold_repeat" min="50" max="1000" step="25">
                        <span class="settings__unit">мс</span>
                    </label>
                    <label class="settings__row">
                        <span class="settings__label">Задержка подсказки</span>
                        <input type="number" class="settings__input" id="cfg_hint_delay" min="0" max="10" step="0.5">
                        <span class="settings__unit">сек</span>
                    </label>
                </div>

                <div class="settings__block">
                    <div class="settings__section-title">Прочее</div>
                    <label class="settings__row">
                        <span class="settings__label">Часовой пояс</span>
                        <input type="text" class="settings__input settings__input--wide" id="cfg_timezone"
                            placeholder="America/Los_Angeles">
                    </label>
                    <label class="settings__row">
                        <span class="settings__label">Округление чистого времени</span>
                        <input type="number" class="settings__input" id="cfg_round_dur" min="1" max="60">
                        <span class="settings__unit">мин</span>
                    </label>
                    <label class="settings__row">
                        <span class="settings__label">Округление готовности</span>
                        <input type="number" class="settings__input" id="cfg_round_dt" min="1" max="60">
                        <span class="settings__unit">мин</span>
                    </label>
                </div>
            </div>

            <!-- Footer actions -->
            <div class="settings__footer">
                <button type="button" class="settings__btn-reset" id="settings_reset">Сбросить</button>
                <button type="button" class="settings__btn-cancel" id="settings_cancel">Отмена</button>
                <button type="button" class="settings__btn-save" id="settings_save">Сохранить</button>
            </div>
        </div>

        <!-- Inputs -->
        <div class="calc__fields">

            <div class="calc__group">
                <label class="calc__label" for="sheets_count">Кол-во листов материала</label>
                <div class="calc__number-wrap">
                    <button type="button" class="calc__step calc__step--minus" tabindex="-1" data-target="sheets_count">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <input class="calc__input calc__input--center" type="number" id="sheets_count" name="sheets_count"
                        min="0" placeholder="0" inputmode="numeric">
                    <button type="button" class="calc__step calc__step--plus" tabindex="-1" data-target="sheets_count">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="calc__group">
                <label class="calc__label">Тип кромки</label>
                <div class="calc__number-wrap">
                    <div role="button" class="calc__step calc__step--minus" tabindex="0" id="edge_prev">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </div>
                    <input class="calc__input calc__input--center" type="text" id="edge_type" name="edge_type"
                        value="PVC" readonly style="cursor: default; user-select: none;">
                    <div role="button" class="calc__step calc__step--plus" tabindex="0" id="edge_next">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="calc__group">
                <label class="calc__label" for="delivery_hours">Доставка (часы)</label>
                <div class="calc__number-wrap">
                    <button type="button" class="calc__step calc__step--minus" tabindex="-1"
                        data-target="delivery_hours">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <input class="calc__input calc__input--center calc__input--suffix" type="number" id="delivery_hours"
                        name="delivery_hours" min="0" value="3" inputmode="numeric">
                    <span class="calc__suffix">ч.</span>
                    <button type="button" class="calc__step calc__step--plus" tabindex="-1"
                        data-target="delivery_hours">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="calc__group">
                <label class="calc__label" for="start_date">Начало работ</label>
                <input class="calc__input" type="datetime-local" id="start_date" name="start_date">
            </div>

        </div>

        <!-- Divider -->
        <div class="calc__divider"></div>

        <!-- Results -->
        <div class="calc__results">
            <div class="calc__result">
                <span class="calc__result-label">Чистое время</span>
                <span class="calc__result-value" id="result_duration">—</span>
            </div>
            <div class="calc__result">
                <span class="calc__result-label">Готовность</span>
                <span class="calc__result-value calc__result-value--accent" id="result_datetime">—</span>
            </div>
        </div>

        <!-- Hint / Breakdown -->
        <div id="calc_hint" class="calc__hint"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
